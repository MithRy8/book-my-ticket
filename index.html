<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chai Code Playlist Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
      body {
        font-family: "Outfit", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }
    </style>
  </head>
  <body class="min-h-screen flex flex-col items-center justify-center p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 relative">
    
    <div id="auth-section" class="absolute top-6 right-6 flex gap-4 bg-slate-800/80 p-4 rounded-xl border border-slate-700 shadow-xl">
        <input type="text" id="username" placeholder="Username" class="bg-slate-900 px-3 py-2 rounded text-sm border border-slate-700 outline-none focus:border-emerald-500 transition-all">
        <input type="password" id="password" placeholder="Password" class="bg-slate-900 px-3 py-2 rounded text-sm border border-slate-700 outline-none focus:border-emerald-500 transition-all">
        <button onclick="register()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded text-sm font-bold transition-all">Register</button>
        <button onclick="login()" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded text-sm font-bold transition-all text-white shadow-[0_0_10px_rgba(16,185,129,0.3)]">Login</button>
    </div>

    <div id="user-section" class="absolute top-6 right-6 hidden items-center gap-4 bg-slate-800/80 p-4 rounded-xl border border-emerald-700/50 shadow-xl">
        <span class="text-emerald-400 font-bold tracking-wide" id="user-display"></span>
        <button onclick="logout()" class="text-rose-400 hover:text-rose-300 text-sm font-bold transition-all">Logout</button>
    </div>

    <div class="max-w-7xl w-full bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-slate-700/50 mt-16">
      <div class="text-center mb-10">
        <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-amber-400 mb-4 tracking-tight">
          Chai Aur Code Exclusive<br />
          <br />
          <span class="text-white">
            <span class="font-bold">Backend Domination Playlist</span>
          </span>
        </h1>
        <p class="text-slate-400 text-lg">Book your seat to unlock the ultimate backend journey.</p>
      </div>

      <div class="flex justify-center mb-10">
        <div class="bg-slate-900/50 rounded-full px-6 py-3 border border-slate-700 flex gap-8 items-center">
          <div class="flex items-center gap-3">
            <div class="w-4 h-4 rounded-full bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.6)]"></div>
            <span class="text-slate-300 font-medium tracking-wide">Available</span>
          </div>
          <div class="w-px h-6 bg-slate-700"></div>
          <div class="flex items-center gap-3">
            <div class="w-4 h-4 rounded-full bg-rose-500/20 border border-rose-500/50"></div>
            <span class="text-slate-400 font-medium tracking-wide">Booked</span>
          </div>
        </div>
      </div>

      <div class="flex justify-center">
        <div class="bg-slate-900/40 p-8 rounded-2xl border border-slate-700/50 shadow-inner">
          <table id="tbl" class="border-separate border-spacing-4 mx-auto"></table>
        </div>
      </div>
    </div>

    <script>
      // --- AUTHENTICATION LOGIC ---
      async function register() {
          const u = document.getElementById('username').value;
          const p = document.getElementById('password').value;
          const res = await fetch('/register', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({username: u, password: p})
          });
          const data = await res.json();
          if(res.ok) { alert('Registered successfully! You can now log in.'); }
          else { alert(data.error); }
      }

      async function login() {
          const u = document.getElementById('username').value;
          const p = document.getElementById('password').value;
          const res = await fetch('/login', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({username: u, password: p})
          });
          const data = await res.json();
          if(res.ok) {
              // Save the wristband to localStorage!
              localStorage.setItem('token', data.token);
              localStorage.setItem('username', data.username);
              checkAuth();
          } else { alert(data.error); }
      }

      function logout() {
          // Throw away the wristband
          localStorage.removeItem('token');
          localStorage.removeItem('username');
          checkAuth();
      }

      function checkAuth() {
          const token = localStorage.getItem('token');
          const username = localStorage.getItem('username');
          if(token) {
              document.getElementById('auth-section').classList.add('hidden');
              document.getElementById('user-section').classList.remove('hidden');
              document.getElementById('user-section').classList.add('flex');
              document.getElementById('user-display').innerText = `👋 Welcome, ${username}`;
          } else {
              document.getElementById('auth-section').classList.remove('hidden');
              document.getElementById('user-section').classList.add('hidden');
              document.getElementById('user-section').classList.remove('flex');
          }
      }

      // --- SEAT BOOKING LOGIC ---
      async function run() {
        checkAuth(); // Check if user is logged in on page load
        const tbl = document.getElementById("tbl");
        tbl.innerHTML = ""; // Clear existing table
        
        const res = await fetch("/seats");
        const resarray = await res.json();
        const j = resarray.sort((a, b) => a.id - b.id);
        
        let tr;
        for (let i = 0; i < j.length; i++) {
          if (i % 8 === 0) {
              tr = document.createElement("tr");
              tbl.appendChild(tr);
          }

          const td = document.createElement("td");
          const baseClasses = "w-32 h-32 rounded-2xl text-center align-middle text-2xl font-bold transition-all duration-300 select-none relative group";

          if (j[i].isbooked) {
            td.className = `${baseClasses} bg-rose-500/10 text-rose-500/60 border border-rose-500/20 cursor-not-allowed`;
            td.innerHTML = `
                    <span class="relative z-10">${j[i].id}</span>
                    <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 px-4 py-2 bg-slate-900 border border-slate-700 text-sm text-slate-300 rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 whitespace-nowrap shadow-2xl z-50 pointer-events-none font-normal shadow-[0_10px_25px_rgba(0,0,0,0.5)]">
                        Booked by: <span class="font-bold text-white ml-1">${j[i].name}</span>
                        <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[1px] border-[6px] border-transparent border-t-slate-700"></div>
                        <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[2px] border-[5px] border-transparent border-t-slate-900"></div>
                    </div>
                `;
          } else {
            td.className = `${baseClasses} bg-emerald-500 text-white border-2 border-emerald-400 shadow-[0_0_20px_rgba(16,185,129,0.3)] cursor-pointer hover:bg-emerald-400 hover:-translate-y-1.5 hover:shadow-[0_10px_25px_rgba(16,185,129,0.5)] active:scale-95 active:shadow-[0_0_10px_rgba(16,185,129,0.3)]`;
            td.innerHTML = `<span class="relative z-10">${j[i].id}</span>`;
            
            // THE CLICK EVENT FOR BOOKING
            td.addEventListener("click", async function () {
              const token = localStorage.getItem('token');
              const username = localStorage.getItem('username');
              
              if (!token) {
                  alert("🚨 Access Denied! You must log in first to book a seat.");
                  return;
              }

              if (confirm(`Book Seat ${j[i].id} under the name ${username}?`)) {
                  try {
                      // Notice we pass the 'Authorization' header here!
                      const res = await fetch(`/${j[i].id}/${username}`, { 
                          method: "PUT",
                          headers: {
                              'Authorization': `Bearer ${token}` 
                          }
                      });
                      const data = await res.json();

                      if (data.error) {
                          alert(data.error);
                      } else {
                          // The Easter Egg Redirect!
                          if(confirm("✅ Seat Booked Successfully! Ready to start the Chai Aur Code Backend Playlist?")) {
                              window.open("https://www.youtube.com/playlist?list=PLu71SKxNbfoBsM4z0HofBqG7W-W_y5pBq", "_blank");
                          }
                          run(); // Refresh the grid
                      }
                  } catch (ex) {
                      alert("Error booking: " + ex);
                  }
              }
            });
          }
          tr.appendChild(td);
        }
      }
      run();
    </script>
  </body>
</html>
