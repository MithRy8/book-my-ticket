<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chai Code Playlist Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
      body {
        font-family: "Outfit", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }
      /* Custom scrollbar for the table container */
      ::-webkit-scrollbar {
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1e293b;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex flex-col items-center justify-center p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 relative"
  >
    <div
      id="auth-section"
      class="absolute top-6 right-6 flex gap-3 bg-slate-800/80 p-4 rounded-xl border border-slate-700 shadow-xl z-20"
    >
      <input
        type="email"
        id="email"
        placeholder="Email"
        class="bg-slate-900 px-3 py-2 rounded text-sm border border-slate-700 outline-none focus:border-emerald-500 transition-all w-48"
      />
      <input
        type="text"
        id="username"
        placeholder="Username (Register Only)"
        class="bg-slate-900 px-3 py-2 rounded text-sm border border-slate-700 outline-none focus:border-emerald-500 transition-all w-48"
      />
      <input
        type="password"
        id="password"
        placeholder="Password"
        class="bg-slate-900 px-3 py-2 rounded text-sm border border-slate-700 outline-none focus:border-emerald-500 transition-all w-32"
      />
      <button
        onclick="register()"
        class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded text-sm font-bold transition-all"
      >
        Register
      </button>
      <button
        onclick="login()"
        class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded text-sm font-bold transition-all text-white shadow-[0_0_10px_rgba(16,185,129,0.3)]"
      >
        Login
      </button>
    </div>

    <div
      id="user-section"
      class="absolute top-6 right-6 hidden items-center gap-4 bg-slate-800/80 p-4 rounded-xl border border-emerald-700/50 shadow-xl z-20"
    >
      <span
        class="text-emerald-400 font-bold tracking-wide"
        id="user-display"
      ></span>
      <button
        onclick="logout()"
        class="text-rose-400 hover:text-rose-300 text-sm font-bold transition-all"
      >
        Logout
      </button>
    </div>

    <div
      class="max-w-7xl w-full bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-slate-700/50 mt-16 relative z-10"
    >
      <div class="text-center mb-8">
        <h1
          class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-amber-400 mb-4 tracking-tight"
        >
          Chai Aur Code Exclusive<br />
          <span class="text-white text-3xl font-bold"
            >Learning Hub Playlist</span
          >
        </h1>
        <p class="text-slate-400 text-lg mb-8">
          Select your course, book your seat, and start coding.
        </p>

        <div
          id="playlist-grid"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8 max-w-5xl mx-auto"
        ></div>
      </div>

      <div class="flex justify-center mb-10">
        <div
          class="bg-slate-900/50 rounded-full px-6 py-3 border border-slate-700 flex gap-8 items-center"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-4 h-4 rounded-full bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.6)]"
            ></div>
            <span class="text-slate-300 font-medium tracking-wide"
              >Available</span
            >
          </div>
          <div class="w-px h-6 bg-slate-700"></div>
          <div class="flex items-center gap-3">
            <div
              class="w-4 h-4 rounded-full bg-rose-500/20 border border-rose-500/50"
            ></div>
            <span class="text-slate-400 font-medium tracking-wide">Booked</span>
          </div>
        </div>
      </div>

      <div class="flex justify-center">
        <div
          class="bg-slate-900/40 p-8 rounded-2xl border border-slate-700/50 shadow-inner overflow-x-auto w-full max-w-4xl"
        >
          <table
            id="tbl"
            class="border-separate border-spacing-4 mx-auto"
          ></table>
        </div>
      </div>
    </div>

    <div
      id="success-modal"
      class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 transition-opacity duration-300"
    >
      <div
        class="bg-slate-800 p-8 rounded-3xl border-2 border-emerald-500/50 shadow-[0_0_50px_rgba(16,185,129,0.2)] text-center max-w-md transform scale-95 transition-transform duration-300"
        id="modal-content"
      >
        <div class="text-6xl mb-6 drop-shadow-lg">🚀</div>
        <h2 class="text-3xl font-bold text-white mb-2">Seat Booked!</h2>
        <p class="text-slate-300 mb-8 text-lg" id="modal-text">
          You are locked in. Ready to start?
        </p>
        <div class="flex gap-4 justify-center">
          <button
            onclick="closeModal()"
            class="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold text-white transition-all"
          >
            Maybe Later
          </button>
          <button
            id="redirect-btn"
            class="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-bold text-white transition-all shadow-[0_0_20px_rgba(16,185,129,0.4)] flex items-center gap-2"
          >
            Start Watching
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M14 5l7 7m0 0l-7 7m7-7H3"
              ></path>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script>
      // --- PLAYLIST DATA & UI LOGIC ---
      const playlists = [
        {
          id: 0,
          name: "Chai aur Typescript",
          url: "https://www.youtube.com/watch?v=-AXlZw6Gatw&list=PLu71SKxNbfoBkkr8lblqtsJvxrw3j1tWC",
          img: "/images/chai_ts.jpg",
        },
        {
          id: 1,
          name: "Chai aur Javascript Backend",
          url: "https://www.youtube.com/watch?v=EH3vGeqeIAo&list=PLu71SKxNbfoBGh_8p_NS-ZAh6v7HhYqHW",
          img: "/images/chai_js.jpg",
        },
        {
          id: 2,
          name: "Chai aur React",
          url: "https://www.youtube.com/watch?v=vz1RlUyrc3w&list=PLu71SKxNbfoDqgPchmvIsL4hTnJIrtige",
          img: "/images/chai_react.jpg",
        },
        {
          id: 3,
          name: "Chai aur DSA",
          url: "https://www.youtube.com/watch?v=QUX18Ba9cd8&list=PLu71SKxNbfoAMcPw8uJXxjeLwYQV8MkpQ",
          img: "/images/chai_dsa.jpg",
        },
      ];

      // Default selected is the first one
      let selectedPlaylist = playlists[0];

      function renderPlaylists() {
        const grid = document.getElementById("playlist-grid");
        grid.innerHTML = "";

        playlists.forEach((playlist) => {
          const isSelected = selectedPlaylist.id === playlist.id;

          const borderClass = isSelected
            ? "border-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.3)] ring-2 ring-emerald-500 ring-offset-2 ring-offset-slate-800"
            : "border-slate-700 opacity-60 hover:opacity-100";
          const textClass = isSelected
            ? "text-emerald-400 font-bold"
            : "text-slate-300";
          const checkIcon = isSelected
            ? `<div class="absolute top-2 right-2 bg-emerald-500 rounded-full p-1 shadow-lg"><svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>`
            : "";

          grid.innerHTML += `
                  <div onclick="selectPlaylist(${playlist.id})" class="relative cursor-pointer border-2 rounded-xl overflow-hidden transition-all duration-300 transform hover:-translate-y-1 bg-slate-800 group ${borderClass}">
                      ${checkIcon}
                      <img src="${playlist.img}" alt="${playlist.name}" class="w-full h-32 object-cover border-b-2 border-slate-700">
                      <div class="p-3 text-center">
                          <p class="text-sm tracking-wide ${textClass}">${playlist.name}</p>
                      </div>
                  </div>
              `;
        });
      }

      function selectPlaylist(id) {
        selectedPlaylist = playlists.find((p) => p.id === id);
        renderPlaylists(); // Re-render the grid to show the new selection
      }

      renderPlaylists();

      async function register() {
        const e = document.getElementById("email").value;
        const u = document.getElementById("username").value;
        const p = document.getElementById("password").value;
        const res = await fetch("/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: e, username: u, password: p }), // Passed email here
        });
        const data = await res.json();
        if (res.ok) {
          alert("Registered successfully! You can now log in.");
          document.getElementById("username").value = ""; // Clear username to prep for login
        } else {
          alert(data.error);
        }
      }

      async function login() {
        const e = document.getElementById("email").value;
        const p = document.getElementById("password").value;
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: e, password: p }), // Notice we only send email and password!
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("username", data.username); // The server still hands us the username back!
          checkAuth();
        } else {
          alert(data.error);
        }
      }

      function logout() {
        localStorage.removeItem("token");
        localStorage.removeItem("username");
        checkAuth();
      }

      function checkAuth() {
        const token = localStorage.getItem("token");
        const username = localStorage.getItem("username");
        if (token) {
          document.getElementById("auth-section").classList.add("hidden");
          document.getElementById("user-section").classList.remove("hidden");
          document.getElementById("user-section").classList.add("flex");
          document.getElementById("user-display").innerText =
            `👋 Welcome, ${username}`;
        } else {
          document.getElementById("auth-section").classList.remove("hidden");
          document.getElementById("user-section").classList.add("hidden");
          document.getElementById("user-section").classList.remove("flex");
        }
      }

      function showModal(playlistName, playlistUrl) {
        const modal = document.getElementById("success-modal");
        const modalContent = document.getElementById("modal-content");

        document.getElementById("modal-text").innerHTML =
          `You are booked for <br/><span class="text-emerald-400 font-bold text-xl block mt-2">${playlistName}</span>`;

        document.getElementById("redirect-btn").onclick = () => {
          window.open(playlistUrl, "_blank");
          closeModal();
        };

        modal.classList.remove("hidden");
        setTimeout(() => {
          modal.classList.remove("opacity-0");
          modalContent.classList.remove("scale-95");
        }, 10);
      }

      function closeModal() {
        const modal = document.getElementById("success-modal");
        const modalContent = document.getElementById("modal-content");

        modal.classList.add("opacity-0");
        modalContent.classList.add("scale-95");
        setTimeout(() => {
          modal.classList.add("hidden");
        }, 300);
      }

      async function run() {
        checkAuth();
        const tbl = document.getElementById("tbl");
        tbl.innerHTML = "";

        const res = await fetch("/seats");
        const resarray = await res.json();
        const j = resarray.sort((a, b) => a.id - b.id);

        let tr;
        for (let i = 0; i < j.length; i++) {
          if (i % 8 === 0) {
            tr = document.createElement("tr");
            tbl.appendChild(tr);
          }

          const td = document.createElement("td");
          const baseClasses =
            "w-32 h-32 rounded-2xl text-center align-middle text-2xl font-bold transition-all duration-300 select-none relative group";

          if (j[i].isbooked) {
            td.className = `${baseClasses} bg-rose-500/10 text-rose-500/60 border border-rose-500/20 cursor-not-allowed`;
            td.innerHTML = `
                    <span class="relative z-10">${j[i].id}</span>
                    <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 px-4 py-2 bg-slate-900 border border-slate-700 text-sm text-slate-300 rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 whitespace-nowrap shadow-2xl z-50 pointer-events-none font-normal shadow-[0_10px_25px_rgba(0,0,0,0.5)]">
                        Booked by: <span class="font-bold text-white ml-1">${j[i].name}</span>
                        <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[1px] border-[6px] border-transparent border-t-slate-700"></div>
                        <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[2px] border-[5px] border-transparent border-t-slate-900"></div>
                    </div>
                `;
          } else {
            td.className = `${baseClasses} bg-emerald-500 text-white border-2 border-emerald-400 shadow-[0_0_20px_rgba(16,185,129,0.3)] cursor-pointer hover:bg-emerald-400 hover:-translate-y-1.5 hover:shadow-[0_10px_25px_rgba(16,185,129,0.5)] active:scale-95 active:shadow-[0_0_10px_rgba(16,185,129,0.3)]`;
            td.innerHTML = `<span class="relative z-10">${j[i].id}</span>`;

            td.addEventListener("click", async function () {
              const token = localStorage.getItem("token");
              const username = localStorage.getItem("username");

              if (!token) {
                alert(
                  "🚨 Access Denied! You must log in first to book a seat.",
                );
                return;
              }

              if (
                confirm(
                  `Book Seat ${j[i].id} for "${selectedPlaylist.name}" under the name ${username}?`,
                )
              ) {
                try {
                  const res = await fetch(`/${j[i].id}/${username}`, {
                    method: "PUT",
                    headers: { Authorization: `Bearer ${token}` },
                  });
                  const data = await res.json();

                  if (data.error) {
                    alert(data.error);
                  } else {
                    showModal(selectedPlaylist.name, selectedPlaylist.url);
                    run(); // Refresh the grid
                  }
                } catch (ex) {
                  alert("Error booking: " + ex);
                }
              }
            });
          }
          tr.appendChild(td);
        }
      }
      run();
    </script>
  </body>
</html>
